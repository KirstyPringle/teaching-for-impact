site_name: "Advocacy for Sustainable Research"
site_url: https://kirstypringle.github.io/advocacy-for-sustainable-research/

use_directory_urls: true

theme:
  name: material
  logo: 
  favicon: 
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.prune
    - navigation.indexes
    - navigation.footer
    - content.tabs.link
    - toc.integrate
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - toc.follow          # Highlight on scroll

  palette:
    - scheme: default


extra_css:
  - stylesheets/extra.css

# extra_javascript:
#   - javascripts/passwords.js

markdown_extensions:
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - tables
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true 
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - toc:
      permalink: true      # Add anchor links
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
      toc_depth: 2       # Maximum depth

hooks:
  - scripts/hooks.py

watch:
  - presentations

plugins:
  - glightbox
  - search
  - macros:
      include_dir: includes


extra:
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - manage
      - reject

copyright: >
  Copyright &copy; 2026 NetDRIVE - CC BY 4.0 · https://creativecommons.org/licenses/by/4.0/-  - <a href="#__consent">Change cookie settings</a>
nav:
  - Home: index.md
  - Introduction: introduction.md
  - The Need for Change: green-change/the-need-for-change.md
  - Green Change: green-change/green-change.md
  - The Power of Stories: green-change/the-power-of-stories.md 
  - Conclusion: conclusion.md
  - Activities: activities/activities-all.md 

-Resources:
      - Overview: resources/index.md
      - Glossary: resources/glossary.md
      - Course Itinerary: resources/course-itinerary.md
      - Evaluation and Feedback: resources/evaluation-feedback.md